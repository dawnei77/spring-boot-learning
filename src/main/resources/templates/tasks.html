<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Tasks</title>
</head>
<body>
    <h1>My Tasks</h1>

    <form th:action="@{/tasks/add}" method="post">
        <input type="text" name="title" placeholder="New task..." required>
        <button type="submit">Add Task</button>
    </form>

    <h2>Pending :</h2>
    <ul>
        <li th:each="task : ${tasks}" th:if="${!task.done}">
            <form th:action="@{/tasks/complete}" method="post">
                <input type="hidden" name="id" th:value="${task.id}" />
                <input type="checkbox" th:checked="${task.done}" onchange="this.form.submit()" />
                <span th:text="${task.title}"></span>
            </form>
            <form th:action="@{/tasks/delete}" method="post">
                <input type="hidden" name="id" th:value="${task.id}" />
                <button type="submit">Delete</button>
            </form>
        </li>
    </ul>

    <h2>Completed :</h2>
    <ul>
        <li th:each="task : ${tasks}" th:if="${task.done}">
            <form th:action="@{/tasks/complete}" method="post">
                <input type="hidden" name="id" th:value="${task.id}" />
                <input type="checkbox" th:checked="${task.done}" onchange="this.form.submit()" />
                <span th:text="${task.title}"></span>
            </form>
            <form th:action="@{/tasks/delete}" method="post">
                <input type="hidden" name="id" th:value="${task.id}" />
                <button type="submit">Delete</button>
            </form>
        </li>
    </ul>
    <br><br>
    <form th:action="@{/account/delete}" method="post" onsubmit="return confirm('Are you sure you want to delete your account? This cannot be undone.');">
        <button type="submit">Delete Account</button>
    </form>
    <form th:action="@{/logout}" method="post">
        <button type="submit">Logout</button>
    </form>
</body>
</html>
