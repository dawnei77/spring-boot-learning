<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>neicheck</title>

<!-- CSRF tokens: your SecurityConfig doesn't disable CSRF (except h2-console),
     so every fetch() call in tasks.js needs to send this header. -->
<meta name="_csrf" th:content="${_csrf.token}">
<meta name="_csrf_header" th:content="${_csrf.headerName}">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@400&family=Inter:wght@400;500;600&family=Libre+Franklin:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
  <header>
    <div class="logo">neicheck</div>
    <div class="profile" id="profileBtn">
      <div class="avatar"><span th:text="${#strings.substring(username,0,1)}">d</span></div>
      <div class="profile-name" th:text="${username}">dawnei</div>

      <div class="account-menu" id="accountMenu">
        <div class="menu-header">
          <div class="menu-avatar" th:text="${#strings.substring(username,0,1)}">d</div>
          <span th:text="${username}">dawnei</span>
        </div>

        <!-- Real logout: Spring Security's own logout endpoint, not JS -->
        <form th:action="@{/logout}" method="post">
          <button class="menu-btn" type="submit">Logout</button>
        </form>

        <!-- Real delete-account: your existing /account/delete endpoint.
             This one deliberately still does a normal page navigation
             (not AJAX) since it's leaving to /login afterwards anyway. -->
        <form th:action="@{/account/delete}" method="post"
              onsubmit="return confirm('Delete your account? This can\'t be undone.');">
          <button class="menu-danger" type="submit">Delete account</button>
        </form>
      </div>
    </div>
  </header>

  <div class="app">
    <div class="center-state" id="emptyState" th:classappend="${tasks.isEmpty()} ? 'visible' : ''">
      <div class="emoji">🪴</div>
      <h1 th:text="'Hi ' + ${username} + '! Begin?'">Hi Dawnei! Begin?</h1>
      <div class="pill accent" id="emptyInputWrap">
        <input type="text" id="emptyInput" placeholder="New task" autocomplete="off">
        <button class="pill-add" id="emptyAddBtn" aria-label="Add task">+</button>
      </div>
    </div>

    <div class="center-state" id="celebrateState">
      <h1>Completed! 🪄</h1>
      <div class="pill accent" id="celebrateInputWrap">
        <input type="text" id="celebrateInput" placeholder="New task" autocomplete="off">
        <button class="pill-add" id="celebrateAddBtn" aria-label="Add task">+</button>
      </div>
    </div>

    <div class="working-state" id="workingState" th:classappend="${!tasks.isEmpty()} ? 'visible' : ''">
      <div class="board" id="board">
        <div class="list-col">
          <div class="pill default" id="workingInputWrap">
            <input type="text" id="workingInput" placeholder="Add task" autocomplete="off">
            <button class="pill-add" id="workingAddBtn" aria-label="Add task">+</button>
          </div>

          <div class="list-card" id="activeCard">
            <div class="task-row" th:each="task : ${tasks}" th:if="${!task.done}" th:attr="data-id=${task.id}">
              <div class="checkbox"></div>
              <div class="label" th:text="${task.title}">Task</div>
              <button class="delete-btn" aria-label="Delete task">✕</button>
            </div>
          </div>

          <div class="board-footer">
            <div class="completed-count">
              <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="#B3BCBE" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
              <span class="count" id="completedCount" th:text="${#lists.size(tasks.?[done])}">0</span>
            </div>
            <button class="toggle" id="toggleCompleted" aria-label="Show completed tasks">
              <span class="knob"></span>
            </button>
          </div>
        </div>

        <div class="list-col completed-col" id="completedCol">
          <div class="list-card completed-card" id="completedCard">
            <div class="task-row" th:each="task : ${tasks}" th:if="${task.done}" th:attr="data-id=${task.id}">
              <span class="check-wrap">
                <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="#8140E3" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
              </span>
              <div class="label" th:text="${task.title}">Task</div>
              <button class="delete-btn" aria-label="Delete task">✕</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script th:src="@{/js/tasks.js}"></script>
</body>
</html>
